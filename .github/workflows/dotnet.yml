# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET Tests

on:
  push:
    # branches: ["main"]
  pull_request:
    # branches: ["main"]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Restore dependencies
        run: dotnet restore OrderService.slnx
      - name: Build
        run: dotnet build OrderService.slnx --no-restore --configuration Release
      - name: Run all test projects
        shell: bash
        run: |
          TEST_PROJECTS=(
            "OrderService.Tests.Api/OrderService.Tests.Api.csproj"
            "OrderService.Tests.Application/OrderService.Tests.Application.csproj"
            "OrderService.Tests.Domain/OrderService.Tests.Domain.csproj"
            "OrderService.Tests.Infrastructure/OrderService.Tests.Infrastructure.csproj"
          )

          for project in "${TEST_PROJECTS[@]}"; do
            project_name=$(basename "$project" .csproj)
            echo "Running tests for $project_name"

            dotnet test "$project" \
              --no-build \
              --configuration Release \
              --collect:"XPlat Code Coverage" \
              --results-directory "TestResults/$project_name" \
              --logger "trx;LogFileName=$project_name.trx" \
              --verbosity normal
          done
      - name: Upload test results and coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
